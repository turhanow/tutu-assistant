name: Release image

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: Release gate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish immutable image
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      gar_image: ${{ steps.gar-image.outputs.name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Validate semantic version tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Authenticate to Google Cloud without a service-account key
        id: google-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.google-auth.outputs.access_token }}

      - name: Normalize image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build Artifact Registry image name
        id: gar-image
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          REPOSITORY: ${{ vars.GAR_REPOSITORY }}
          IMAGE: ${{ vars.GAR_IMAGE }}
        run: echo "name=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Generate OCI metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and publish multi-platform image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.gar-image.outputs.name }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest published image
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Write release summary
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Published image"
            echo
            echo "\`$IMAGE@$DIGEST\`"
            echo
            echo "Promote this exact digest with the **Promote image** workflow."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-cloud-run:
    name: Deploy immutable image to Cloud Run
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Authenticate to Google Cloud without a service-account key
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy Cloud Run revision by digest
        id: deploy
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          image: ${{ needs.publish.outputs.gar_image }}@${{ needs.publish.outputs.digest }}
          timeout: 60s
          env_vars_update_strategy: overwrite
          env_vars: |-
            BOT_TRANSPORT=webhook
            PUBLIC_BASE_URL=https://${{ vars.CLOUD_RUN_SERVICE }}-${{ vars.GCP_PROJECT_NUMBER }}.${{ vars.GCP_REGION }}.run.app
            FEEDBACK_ENABLED=false
            TONE_OF_VOICE_V2_ENABLED=true
            CONTROLLED_DELIGHT_ENABLED=true
            MAX_CONCURRENT_UPDATES=16
            WEBHOOK_MAX_CONNECTIONS=16
          secrets_update_strategy: overwrite
          secrets: |-
            TELEGRAM_BOT_TOKEN=telegram-bot-token:1
            OPENAI_API_KEY=openai-api-key:1
            TELEGRAM_WEBHOOK_SECRET=telegram-webhook-secret:2
          flags: >-
            --service-account=${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
            --ingress=all
            --min-instances=0
            --max-instances=1
            --concurrency=16
            --cpu=1
            --memory=512Mi
            --execution-environment=gen2

      - name: Verify production health and readiness
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          curl --retry 12 --retry-all-errors --retry-delay 5 --fail --silent --show-error \
            --output /dev/null "$SERVICE_URL/health"
          curl --retry 12 --retry-all-errors --retry-delay 5 --fail --silent --show-error \
            --output /dev/null "$SERVICE_URL/readyz"

      - name: Write deployment summary
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
          IMAGE: ${{ needs.publish.outputs.gar_image }}
          DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          {
            echo "## Cloud Run deployment"
            echo
            echo "Image: \`$IMAGE@$DIGEST\`"
            echo
            echo "Service: $SERVICE_URL"
            echo
            echo "Feedback remains disabled until a persistent external store is configured."
          } >> "$GITHUB_STEP_SUMMARY"
