name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: Quality and supply chain
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install locked environment
        run: |
          python -m pip install -r requirements.lock
          python -m pip install --no-deps -e .
          python -m pip check

      - name: Lint
        run: python -m ruff check app tests scripts

      - name: Format check
        run: python -m ruff format --check app tests scripts

      - name: Validate catalogs, schemas, and CI/CD contract
        run: |
          python scripts/validate_destination_catalog.py
          python scripts/validate_cicd.py
          python -m pytest tests/unit/test_catalog_contract.py tests/unit/test_tutu_mcp_adapter.py -q

      - name: Scan repository for credential signatures
        run: python scripts/check_secrets.py

      - name: Audit locked dependencies
        run: |
          python -m pip install pip-audit==2.10.1
          python -m pip_audit -r requirements.lock

      - name: Build distributable wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .

      - name: Upload wheel
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: python-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  tests:
    name: Unit and contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install locked environment
        run: |
          python -m pip install -r requirements.lock
          python -m pip install --no-deps -e .

      - name: Run test suite with coverage gate
        run: >-
          python -m pytest
          --cov=app
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7

  container:
    name: Container build
    needs: [quality, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build production image without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: tutu-assistant:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
